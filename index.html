<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThesisTrack — IGLPIS</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>

  <!-- Loading screen saat Firebase connect -->
  <div id="loading-screen" style="
    position:fixed;inset:0;
    background:#0D1117;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    z-index:9999;font-family:'Syne',sans-serif;
  ">
    <div style="
      width:48px;height:48px;border-radius:50%;
      border:3px solid #30363D;
      border-top-color:#7C3AED;
      animation:spin 0.8s linear infinite;
      margin-bottom:20px;
    "></div>
    <div style="color:#E6EDF3;font-size:16px;font-weight:600;">ThesisTrack</div>
    <div style="color:#6E7681;font-size:12px;margin-top:6px;font-family:'JetBrains Mono',monospace;" id="loading-status">
      Menghubungkan ke Firebase...
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </div>

  <!-- Login screen (muncul jika belum login) -->
  <div id="login-screen" style="
    display:none;position:fixed;inset:0;
    background:#0D1117;
    align-items:center;justify-content:center;
    z-index:9998;
  ">
    <div style="
      background:#161B22;border:1px solid #30363D;
      border-radius:16px;padding:40px;
      width:100%;max-width:400px;
      font-family:'Syne',sans-serif;
      text-align:center;
    ">
      <div style="font-size:28px;margin-bottom:8px;">🎓</div>
      <div style="font-size:20px;font-weight:700;color:#E6EDF3;margin-bottom:4px;">ThesisTrack</div>
      <div style="font-size:12px;color:#6E7681;font-family:'JetBrains Mono',monospace;margin-bottom:32px;">IGLPIS · Progres Tesisku</div>

      <button id="btn-google-login" style="
        width:100%;
        background:#fff;color:#1a1a1a;
        border:none;border-radius:10px;
        padding:13px 20px;
        font-size:14px;font-weight:600;
        cursor:pointer;
        display:flex;align-items:center;justify-content:center;gap:12px;
        font-family:'Syne',sans-serif;
        transition:background 0.15s;
      ">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20c0-1.3-.15-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.2 8 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.4-5.1l-6.2-5.2C29.3 35.2 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.3C9.7 35.7 16.3 40 24 40v4z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.1-2.1 3.9-3.8 5.2l6.2 5.2C37.3 40.1 44 35 44 24c0-1.3-.15-2.6-.4-3.9z"/>
        </svg>
        Masuk dengan Google
      </button>

      <div style="margin-top:20px;font-size:11px;color:#484F58;line-height:1.6;">
        Aplikasi pribadi untuk memantau progres tesis.<br>
        Data tersimpan di cloud & sync semua perangkat.
      </div>
    </div>
  </div>

  <!-- App container -->
  <div id="app"></div>

  <!-- Entry point (Vite will bundle ini) -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
